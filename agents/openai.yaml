interface:
  display_name: "Superpilot"
  short_description: "Existing-repository workflow from design through verification"
  default_prompt: "Handle this existing-repository task with Superpilot: collaborate on the design when needed, write a spec and plan for non-trivial implementation work, investigate root cause before fixes when debugging, execute autonomously with TDD and optional subagents, keep review findings internal unless the task is explicitly review-only, verify with evidence, and do not publish unless explicitly asked."
