interface:
  display_name: "Superpilot"
  short_description: "Research-first autonomous existing-repository workflow with subagent and verification gates"
  default_prompt: "Handle this existing-repository task with Superpilot: research before guessing when external facts matter, collaborate on the design when needed, preserve the full requirement ledger from request to verification, write a spec and plan for non-trivial implementation work, investigate root cause before fixes when debugging, choose isolated worktrees or fresh subagents when helpful, discover subagent tooling before assuming it is unavailable, dispatch fresh subagents for every non-micro Superpilot task unless no safe bounded slice exists, never require the user to separately ask for parallel agents, prefer safe code-edit or test-edit subagent slices before read-only fallback, do not stop at one read-only explorer when test, review, or verification slices can run in parallel, parallelize independent exploration, research, implementation, test, review, and verification work when safe, use subagents to reduce elapsed time through real parallelism rather than checkbox compliance, count only received and read usable subagent results, execute autonomously with TDD, keep review findings internal unless the task is explicitly review-only, evaluate E2E for integrated user-facing behavior, run E2E locally by default, require local browser smoke or E2E beyond unit tests for sorting, filtering, pagination, dropdown, XHR, search, tab, or infinite-scroll changes, create an isolated local browser/E2E target when the default local app risks production or shared data, treat missing required Superpilot criteria as blockers rather than final-report caveats, use isolated SQLite-backed E2E persistence by default, verify with evidence including user-flow, drift, and security checks when relevant, and do not publish unless explicitly asked."
