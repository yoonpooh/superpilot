interface:
  display_name: "Superpilot"
  short_description: "Research-first autonomous existing-repository workflow with subagent and verification gates"
  default_prompt: "Handle this existing-repository task with Superpilot: research before guessing when external facts matter, collaborate on the design when needed, preserve the full requirement ledger from request to verification, write a spec and plan for non-trivial implementation work, investigate root cause before fixes when debugging, choose isolated worktrees or fresh subagents when helpful, discover subagent tooling before assuming it is unavailable, dispatch at least one fresh subagent for non-micro implementation tasks unless no safe bounded slice exists, execute autonomously with TDD, keep review findings internal unless the task is explicitly review-only, evaluate E2E for integrated user-facing behavior, use isolated SQLite-backed E2E persistence by default, verify with evidence including user-flow, drift, and security checks when relevant, and do not publish unless explicitly asked."
